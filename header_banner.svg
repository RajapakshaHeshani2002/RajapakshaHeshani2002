<svg width="900" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0020"/>
      <stop offset="35%" style="stop-color:#2d0a2e"/>
      <stop offset="70%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d0520"/>
    </linearGradient>
    <linearGradient id="nameG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8fab"/>
      <stop offset="30%" style="stop-color:#ffb3c6"/>
      <stop offset="60%" style="stop-color:#e0aaff"/>
      <stop offset="100%" style="stop-color:#c77dff"/>
    </linearGradient>
    <linearGradient id="subG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffccd5"/>
      <stop offset="50%" style="stop-color:#e0aaff"/>
      <stop offset="100%" style="stop-color:#c77dff"/>
    </linearGradient>
    <linearGradient id="waveTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8fab;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#e0aaff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#c77dff;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bgG)"/>

  <!-- Soft petal shapes top-left -->
  <ellipse cx="60" cy="55" rx="90" ry="55" fill="#ff8fab" opacity="0.07" transform="rotate(-20,60,55)">
    <animate attributeName="opacity" values="0.04;0.1;0.04" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="850" cy="160" rx="90" ry="55" fill="#e0aaff" opacity="0.07" transform="rotate(20,850,160)">
    <animate attributeName="opacity" values="0.1;0.04;0.1" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="450" cy="210" rx="120" ry="40" fill="#ffb3c6" opacity="0.05">
    <animate attributeName="opacity" values="0.03;0.08;0.03" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Orbs -->
  <circle cx="110" cy="95" r="75" fill="#ff8fab" opacity="0.07">
    <animate attributeName="r" values="70;85;70" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.05;0.11;0.05" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="795" cy="120" r="70" fill="#c77dff" opacity="0.07">
    <animate attributeName="r" values="65;80;65" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.05;0.1;0.05" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Wave top -->
  <path d="M0,55 Q225,15 450,55 Q675,95 900,55 L900,0 L0,0 Z" fill="#ff8fab" opacity="0.06"/>
  <path d="M0,75 Q225,35 450,75 Q675,115 900,75 L900,0 L0,0 Z" fill="#e0aaff" opacity="0.04"/>

  <!-- Wave bottom -->
  <path d="M0,165 Q225,205 450,165 Q675,125 900,165 L900,220 L0,220 Z" fill="#c77dff" opacity="0.07"/>
  <path d="M0,180 Q225,215 450,180 Q675,145 900,180 L900,220 L0,220 Z" fill="#ff8fab" opacity="0.05"/>

  <!-- Flower / petal accents (mini) -->
  <!-- Left petal cluster -->
  <ellipse cx="42" cy="50" rx="7" ry="14" fill="#ffb3c6" opacity="0.35" transform="rotate(0,42,50)"/>
  <ellipse cx="42" cy="50" rx="7" ry="14" fill="#ffb3c6" opacity="0.35" transform="rotate(45,42,50)"/>
  <ellipse cx="42" cy="50" rx="7" ry="14" fill="#ffb3c6" opacity="0.35" transform="rotate(90,42,50)"/>
  <ellipse cx="42" cy="50" rx="7" ry="14" fill="#ffb3c6" opacity="0.35" transform="rotate(135,42,50)"/>
  <circle cx="42" cy="50" r="5" fill="#ffd6e7" opacity="0.7"/>

  <!-- Right petal cluster -->
  <ellipse cx="858" cy="170" rx="7" ry="14" fill="#e0aaff" opacity="0.3" transform="rotate(0,858,170)"/>
  <ellipse cx="858" cy="170" rx="7" ry="14" fill="#e0aaff" opacity="0.3" transform="rotate(45,858,170)"/>
  <ellipse cx="858" cy="170" rx="7" ry="14" fill="#e0aaff" opacity="0.3" transform="rotate(90,858,170)"/>
  <ellipse cx="858" cy="170" rx="7" ry="14" fill="#e0aaff" opacity="0.3" transform="rotate(135,858,170)"/>
  <circle cx="858" cy="170" r="5" fill="#d8b4fe" opacity="0.6"/>

  <!-- Floating sparkle dots -->
  <circle cx="70" cy="42" r="2.5" fill="#ff8fab">
    <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;4,-8;0,0" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="170" r="2" fill="#ffb3c6">
    <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="830" cy="48" r="2.5" fill="#e0aaff">
    <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="0.4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-4,-7;0,0" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="178" r="2" fill="#c77dff">
    <animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="330" cy="28" r="2" fill="#ffd6e7">
    <animate attributeName="opacity" values="0;1;0" dur="3.8s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="24" r="2.5" fill="#d8b4fe">
    <animate attributeName="opacity" values="0;1;0" dur="3.2s" begin="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;2,-5;0,0" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="205" r="2" fill="#ffb3c6">
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ✿ symbols -->
  <text x="210" y="48" font-size="13" fill="#ff8fab" opacity="0.45" text-anchor="middle">✿<animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/></text>
  <text x="690" y="52" font-size="12" fill="#e0aaff" opacity="0.45" text-anchor="middle">✿<animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/></text>
  <text x="55" y="190" font-size="10" fill="#c77dff" opacity="0.4" text-anchor="middle">✦<animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/></text>
  <text x="855" y="95" font-size="11" fill="#ffb3c6" opacity="0.4" text-anchor="middle">✦<animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/></text>
  <text x="450" y="212" font-size="9" fill="#e0aaff" opacity="0.35" text-anchor="middle">✿<animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/></text>

  <!-- Decorative lines beside name -->
  <line x1="85" y1="148" x2="365" y2="148" stroke="url(#waveTop)" stroke-width="1" opacity="0.35">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="535" y1="148" x2="815" y2="148" stroke="url(#waveTop)" stroke-width="1" opacity="0.35">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Glow dots beside name -->
  <circle cx="185" cy="102" r="4" fill="#ff8fab" opacity="0.7" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="715" cy="102" r="4" fill="#c77dff" opacity="0.7" filter="url(#glow)">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Main name -->
  <text x="450" y="107" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52" font-weight="bold"
    fill="url(#nameG)" filter="url(#glow)">
    Yehani Rajapaksha
    <animate attributeName="opacity" values="0.88;1;0.88" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="142" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="15" fill="url(#subG)" opacity="0.95">
    ✿  Software Engineer  ·  Web Developer  ·  AI Enthusiast  ✿
  </text>

  <!-- Tagline -->
  <text x="450" y="173" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="13" font-style="italic" fill="#ffd6e7" opacity="0.78">
    Always learning ✨  Always building 🚀  Sri Lanka 🇱🇰
    <animate attributeName="opacity" values="0.55;0.9;0.55" dur="4s" repeatCount="indefinite"/>
  </text>
</svg>
