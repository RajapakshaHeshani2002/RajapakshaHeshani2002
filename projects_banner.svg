<svg width="860" height="230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c1bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2d0a20"/><stop offset="100%" style="stop-color:#1a0020"/></linearGradient>
    <linearGradient id="c2bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#200a2d"/><stop offset="100%" style="stop-color:#1a0028"/></linearGradient>
    <linearGradient id="c3bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1a0a2d"/><stop offset="100%" style="stop-color:#0d0520"/></linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#ff8fab"/><stop offset="100%" style="stop-color:#ffb3c6"/></linearGradient>
