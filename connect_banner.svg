<svg width="750" height="90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1a0020"/><stop offset="100%" style="stop-color:#0d0520"/></linearGradient>
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#ff8fab"/><stop offset="100%" style="stop-color:#e0aaff"/></linearGradient>
    <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#ea4335"/><stop offset="100%" style="stop-color:#ff8fab"/></linearGradient>
    <style>
      .gb{animation:glow1 2.5s ease-in-out infinite;}
      .eb{animation:glow2 2.5s ease-in-out infinite 1.25s;}
      @keyframes glow1{0%,100%{filter:drop-shadow(0 0 5px #ff8fab);}50%{filter:drop-shadow(0 0 14px #ff8fab);}}
      @keyframes glow2{0%,100%{filter:drop-shadow(0 0 5px #ea4335);}50%{filter:drop-shadow(0 0 14px #ea4335);}}
    </style>
  </defs>
  <rect width="750" height="90" fill="url(#bg)" rx="16"/>
  <text x="55" y="28" font-size="12" fill="#ff8fab" opacity="0.4">✿<animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/></text>
  <text x="695" y="68" font-size="12" fill="#e0aaff" opacity="0.4">✿<animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/></text>
  <text x="375" y="14" font-size="9" fill="#ffb3c6" opacity="0.35">✿<animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/></text>
  <!-- GitHub button -->
  <g class="gb">
    <rect x="85" y="20" width="220" height="50" rx="25" fill="none" stroke="url(#b1)" stroke-width="2"/>
    <rect x="87" y="22" width="216" height="46" rx="23" fill="#1a0020" opacity="0.9"/>
    <text x="195" y="40" text-anchor="middle" font-family="Courier New,monospace" font-size="10" fill="#e0aaff" letter-spacing="1.5">GITHUB</text>
    <text x="195" y="57" text-anchor="middle" font-family="Fira Code,monospace" font-size="11" font-weight="600" fill="#ffccd5">RajapakshaHeshani2002</text>
  </g>
  <!-- Online dot -->
  <circle cx="375" cy="45" r="7" fill="#a8e6cf" opacity="0.9">
    <animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Email button -->
  <g class="eb">
    <rect x="445" y="20" width="220" height="50" rx="25" fill="none" stroke="url(#b2)" stroke-width="2"/>
    <rect x="447" y="22" width="216" height="46" rx="23" fill="#1a0020" opacity="0.9"/>
    <text x="555" y="40" text-anchor="middle" font-family="Courier New,monospace" font-size="10" fill="#ffb3c6" letter-spacing="1.5">GMAIL</text>
    <text x="555" y="57" text-anchor="middle" font-family="Fira Code,monospace" font-size="11" font-weight="600" fill="#ffa8c5">rajapakshayehani@gmail.com</text>
  </g>
</svg>
